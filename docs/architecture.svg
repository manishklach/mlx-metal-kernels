<text x="565" y="298" text-anchor="start" font-family="sans-serif" font-size="12" fill="#5F5E5A">feeds</text>

<line x1="470" y1="345" x2="450" y2="290" stroke="#5F5E5A" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text x="445" y="322" text-anchor="end" font-family="sans-serif" font-size="12" fill="#5F5E5A">autotune cache</text>

</svg>
