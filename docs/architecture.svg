<text x="555" y="366" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#444441">pytest, benchmarks</text>
</g>

<line x1="320" y1="100" x2="320" y2="150" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
