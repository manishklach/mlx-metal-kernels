<svg width="680" height="564" viewBox="0 0 680 564" xmlns="http://www.w3.org/2000/svg" role="img">
<title>mlx-metal-kernels architecture</title>
<desc>Layered diagram of the repository: a Python model and generation layer calls composed and primitive ops, which route through a backend autotune layer into Metal kernels running on Apple GPU. A parallel pure-MLX reference path verifies correctness and feeds a test and benchmark suite, which in turn informs the autotune cache.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<rect width="680" height="564" fill="#FFFFFF"/>

<g>
<rect x="190" y="44" width="260" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="320" y="62" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#26215C">Model &amp; generation layer</text>
<text x="320" y="80" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#3C3489">config, tokenizer, sampling</text>
</g>

<g>
<rect x="190" y="150" width="260" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="320" y="168" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#26215C">Composed &amp; primitive ops</text>
<text x="320" y="186" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#3C3489">attention, decode, quant, norm</text>
</g>

<g>
<rect x="190" y="256" width="260" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="320" y="274" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#04342C">Backend router (autotune)</text>
<text x="320" y="292" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#085041">picks fastest verified kernel</text>
</g>

<g>
<rect x="190" y="362" width="260" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="320" y="380" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#4A1B0C">Metal kernels</text>
<text x="320" y="398" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#712B13">kernels/*.metal source</text>
</g>

<g>
<rect x="190" y="468" width="260" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="320" y="486" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">Apple GPU</text>
<text x="320" y="504" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#444441">unified memory, simdgroups</text>
</g>

<g>
<rect x="470" y="203" width="170" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5" stroke-dasharray="4 3"/>
<text x="555" y="221" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">Pure-MLX path</text>
<text x="555" y="239" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#444441">correctness check</text>
</g>

