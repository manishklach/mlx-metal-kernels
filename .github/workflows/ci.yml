name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    # CI provides macOS regression coverage for install/tests.
    # Benchmark numbers, autotune artifacts, and any performance claims remain
    # machine-local evidence and should not be inferred from this workflow.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlx pytest
          pip install -e .
      - name: Run tests
        run: pytest tests -q --tb=short
